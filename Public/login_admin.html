<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login Administrador
    </title>

    <!-- Tipografía -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- Estilos -->

    <link rel="stylesheet" href="CSS/login_admin.css">

</head>

<body>

    <!-- Decoración -->

    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>

    <!-- Regresar -->

    <div
        class="regresa"
        onclick="window.location.href='index.html'"
    >

        <button type="button">
            ← Regresar
        </button>

    </div>

    <!-- Login -->

    <div class="login-card">

        <span class="badge">
            Panel privado
        </span>

        <h1>
            Acceso Administrador
        </h1>

        <p class="subtitle">
            Ingresa tus credenciales para continuar.
        </p>

        <form id="loginAdminForm">

            <div class="form-group">

                <label for="usuario">
                    Usuario
                </label>

                <input
                    type="text"
                    id="usuario"
                    autocomplete="username"
                    required
                >

            </div>

            <div class="form-group">

                <label for="password">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="password"
                    autocomplete="current-password"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn-ingresar"
            >
                Ingresar
            </button>

        </form>

    </div>

    <!-- Scripts -->

    <script src="js/login_admin.js"></script>

</body>

</html>
