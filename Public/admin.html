<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin · Bodega Chelita</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/admin.css">
</head>

<body>
    <div class="admin-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <span class="brand-icon"><i class="bi bi-shop"></i></span>
                    <div>
                        <h2 class="logo">Bodega Chelita</h2>
                        <p class="admin-text">Administrador</p>
                    </div>
                </div>
            </div>

            <button class="btn logout-btn" onclick="window.location.href='index.html'">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </button>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header class="page-header">
                <h1 class="dashboard-title">Panel de agregración de productos</h1>
                <p class="dashboard-subtitle">Ingrese nuevos productos a su bodega.</p>
            </header>

            <!-- FORMULARIO -->
            <div class="admin-card">
                <h3>Registrar producto</h3>

                <form id="productForm">
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <input type="text" class="form-control" id="nombre" placeholder="Nombre" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <input type="number" class="form-control" id="precio" placeholder="Precio" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <input type="text" class="form-control" id="imagen" placeholder="URL Imagen">
                        </div>
                        <div class="col-12 col-md-6">
                            <input type="text" class="form-control" id="categoria" placeholder="Categoría">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-save">
                                <i class="bi bi-plus-lg"></i> Guardar producto
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- TABLA -->
            <div class="admin-card">
                <h3>Lista de productos</h3>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Categoría</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="JS/admin.js"></script>
</body>

</html>
