<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <!-- Falta hacer esta página responsive -->
    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario de Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/estilos/estilo2.css">

</head>

<body>



    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

        <div class="container">

            <a class="navbar-brand logo-title" href="index.html">

                <h2>
                    <b>BODEGA DE BARRIO - Carabayllo</b>
                </h2>

            </a>

            <!-- BOTON HAMBURGUESA -->
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuHamburguesa">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- MENU -->
            <div class="collapse navbar-collapse justify-content-end" id="menuHamburguesa">

                <ul class="navbar-nav">

                    <li class="nav-item">

                        <a class="nav-link text-white" href="index.html">

                            Inicio

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <div class="overlay">

        <!-- CONTAINER RESPONSIVE -->
        <div class="container py-3 py-md-5">

            <!-- ROW -->
            <div class="row justify-content-center">

                <!-- COLUMNA RESPONSIVE -->
                <div class="col-12 col-sm-11 col-md-10 col-lg-7 col-xl-6">

                    <div class="form-box">

                        <!-- TITULO -->
                        <h1 class="text-center mb-4 fs-2 fs-md-1">

                            Registro de Cliente

                        </h1>

                        <!-- FORMULARIO -->
                        <form id="registroForm">

                            <!-- NOMBRES -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Nombres:
                                </label>

                                <input type="text" class="form-control" required>

                            </div>

                            <!-- APELLIDOS -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Apellidos:
                                </label>

                                <input type="text" class="form-control" required>

                            </div>

                            <!-- CORREO -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Correo electrónico:
                                </label>

                                <input type="email" class="form-control" placeholder="ejemplo@gmail.com" required>

                            </div>

                            <!-- PASSWORD -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Contraseña:
                                </label>

                                <input type="password" class="form-control" required>

                            </div>

                            <!-- CELULAR -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Número de celular:
                                </label>

                                <input type="tel" class="form-control">

                            </div>

                            <!-- GENERO -->
                            <div class="mb-3">

                                <label class="form-label d-block">
                                    Género:
                                </label>

                                <!-- FLEX RESPONSIVE -->
                                <div class="d-flex flex-wrap gap-3">

                                    <div class="form-check">

                                        <input class="form-check-input" type="radio" name="genero" required>

                                        <label class="form-check-label">
                                            Masculino
                                        </label>

                                    </div>

                                    <div class="form-check">

                                        <input class="form-check-input" type="radio" name="genero">

                                        <label class="form-check-label">
                                            Femenino
                                        </label>

                                    </div>

                                </div>

                            </div>

                            <!-- DIRECCION -->
                            <div class="mb-3">

                                <label class="form-label">
                                    Dirección:
                                </label>

                                <textarea class="form-control" rows="1" required></textarea>

                            </div>

                            <!-- POLITICAS -->
                            <div class="form-check mb-4">

                                <input class="form-check-input" type="checkbox" required>

                                <label class="form-check-label">

                                    Acepto el tratamiento de datos
                                    y políticas de la tienda virtual.

                                </label>

                            </div>

                            <!-- BOTON -->
                            <div class="d-grid">

                                <button type="submit" class="btn btn-warning btn-lg">

                                    Registrarme

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer>

        © 2026 Bodega Don Pepe - Todos los derechos reservados

        <br>

        Integrantes:
        Francisco Crespo,
        Israel de la Rosa

        <br>

        Contactos: 932-312-493 y 933-444-757

        <img class="Wi" src="/imagenes/WhatsApp_icon.png" alt="WhatsApp">

    </footer>
    <!-- JS -->
    <script src="/javascript/script2.js"></script>

</body>

</html>
